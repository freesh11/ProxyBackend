<!DOCTYPE html>
<html>
<head>
  <title>Proxy Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .bar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1b1b1b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <div class="bar">
    <input id="url" placeholder="Enter URL (example.com)">
    <button onclick="go()">Go</button>
  </div>

  <iframe id="frame"></iframe>

  <script>
    const BACKEND = "https://proxybackend-83xn.onrender.com";

    function go() {
      let url = document.getElementById("url").value.trim();

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      document.getElementById("frame").src =
        BACKEND + "/proxy?url=" + encodeURIComponent(url);
    }
  </script>

</body>
</html>
